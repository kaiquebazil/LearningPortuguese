            font-size: 0.85rem;

            transition: all 0.2s;
            color: var(--text-primary);

            background: var(--accent-yellow);
            border-color: var(--border-dark);
            box-shadow: 2px 2px 0 var(--border-dark);

            align-items: baseline;

            line-height: 1.2;

// Combine all items
const allItems = [];

vocabularyItems.forEach(v => {
    allItems.push({ ...v, type: "vocab" });
});

verbsList.forEach((v, index) => {
    allItems.push({
        id: `verb_${index}_${v.word}`,
        word: v.word,
        translation: v.translation,
        examplePt: v.examplePt,
        exampleEn: v.exampleEn,
        category: "verb",
        type: "verb",
        audioText: v.audioWord || v.word,
        audioExample: v.audioExample || v.examplePt
    });
});

// Helper functions
function escapeHtml(str) { 
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) { 
        if(m === '&') return '&amp;'; 
        if(m === '<') return '&lt;'; 
        if(m === '>') return '&gt;'; 
        return m;
    }); 
}

function escapeAttr(str) { 
    if (!str) return '';
    return str.replace(/['"]/g, ''); 
}

// Audio functions
function playWordAudio(word) {
    if (!window.speechSynthesis) {
        alert("Seu navegador não suporta áudio automático.");
        return;
    }
    const utterance = new SpeechSynthesisUtterance(word);
    utterance.lang = 'pt-BR';
    utterance.rate = 0.85;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(utterance);
}

function playExampleAudio(example) {
    if (!window.speechSynthesis) {
        alert("Seu navegador não suporta áudio automático.");
        return;
    }
    const utterance = new SpeechSynthesisUtterance(example);
    utterance.lang = 'pt-BR';
    utterance.rate = 0.85;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(utterance);
}

// Render items (UNICA versão - sem duplicação!)
function renderItems(filterCategory = "all") {
    const container = document.getElementById("dynamicContentContainer");
    if (!container) return;

    let filtered = [...allItems];
    if (filterCategory !== "all") {
        if (filterCategory === "verb") {
            filtered = allItems.filter(item => item.type === "verb");
        } else {
            filtered = allItems.filter(item => item.category === filterCategory && item.type !== "verb");
        }
    }

    let html = `<div class="vocab-grid">`;
    
    filtered.forEach(item => {
        const categoryDisplay = item.type === "verb" ? "🔹 Verb" : (item.category.charAt(0).toUpperCase() + item.category.slice(1));
        
        html += `
            <div class="card-item" data-id="${item.id}">
                <div class="card-header">
                    <span class="portuguese-word">${escapeHtml(item.word)}</span>
                    <span class="badge-category">${categoryDisplay}</span>
                </div>
                <div class="translation">${escapeHtml(item.translation)}</div>
                <div class="example-area">
                    <div class="example-pt">🇵🇹 ${escapeHtml(item.examplePt)}</div>
                    <div class="example-en">📘 ${escapeHtml(item.exampleEn)}</div>
                    <div style="margin-top: 10px; display: flex; gap: 8px; justify-content: space-between;">
                        <button class="audio-example-btn" data-audio-example="${escapeAttr(item.audioExample || item.examplePt)}" aria-label="Ouvir frase">
                            <i class="fas fa-headphones"></i> 
                        </button>
                        <button class="audio-button" data-audio="${escapeAttr(item.audioText || item.word)}" aria-label="Pronúncia da palavra">
                            <i class="fas fa-volume-up"></i>
                        </button>
                    </div>
                </div>
            </div>
        `;
    });
    
    if(filtered.length === 0) {
        html = `<div style="text-align: center; padding: 3rem;">✨ Nenhuma palavra encontrada. ✨</div>`;
    } else {
        html += `</div>`;
    }
    
    container.innerHTML = html;
    
    // Attach word audio events
    document.querySelectorAll('.audio-button').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const text = btn.getAttribute('data-audio');
            if (text) {
                playWordAudio(text);
            }
        });
    });
    
    // Attach example audio events
    document.querySelectorAll('.audio-example-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const text = btn.getAttribute('data-audio-example');
            if (text) {
                playExampleAudio(text);
            }
        });
    });
}

// Initialize filters
function initFilters() {
    const buttons = document.querySelectorAll('.filter-pill');
    buttons.forEach(btn => {
        btn.addEventListener('click', () => {
            const filterVal = btn.getAttribute('data-filter');
            buttons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderItems(filterVal);
        });
    });
}

// Home reset button
document.getElementById("homeResetBtn")?.addEventListener("click", (e) => {
    e.preventDefault();
    const allFilter = document.querySelector('.filter-pill[data-filter="all"]');
    if(allFilter) {
        document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
        allFilter.classList.add('active');
        renderItems("all");
    } else {
        renderItems("all");
    }
    window.scrollTo({ top: 0, behavior: "smooth" });
});

// Logo click
document.querySelector('.logo')?.addEventListener('click', (e) => {
    e.preventDefault();
    const allBtn = document.querySelector('.filter-pill[data-filter="all"]');
    if(allBtn) allBtn.click();
});

// Initial load
renderItems("all");
initFilters();
