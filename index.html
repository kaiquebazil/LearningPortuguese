<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn Portuguese with Kaique</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="img/favicon.svg" type="image/x-icon">
    <style>
        :root {
            --bg-color: #fafafa;
            --text-main: #000000;
            --text-muted: #6b7280;
            --border-color: #000000;
            --card-bg: #ffffff;
            --shadow-offset: 4px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar */
        header {
            padding: 20px 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #e5e7eb;
            background-color: var(--bg-color);
        }

        header h2 {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
        }

        /* Main Container */
        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 20px;
            width: 100%;
        }

        /* Profile Section */
        .hero {
            text-align: center;
            margin-bottom: 60px;
        }

        .avatar-container {
            display: inline-block;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--border-color);
            box-shadow: var(--shadow-offset) var(--shadow-offset) 0px var(--border-color);
            overflow: hidden;
            margin-bottom: 24px;
            background-color: #e5e5e5;
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hero h1 {
            font-family: 'Fredoka', sans-serif;
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
        }

        .hero p {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 400;
        }

        /* Cards Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 5px 5px 0px var(--border-color);
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 140px;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .card:hover {
            transform: translate(2px, 2px);
            box-shadow: 3px 3px 0px var(--border-color);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
        }

        .card-icon {
            width: 24px;
            height: 24px;
            color: var(--text-main);
        }

        .card-emoji {
            font-size: 1.5rem;
            line-height: 1;
        }

        .card-title {
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            line-height: 1.3;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .hero h1 {
                font-size: 2.2rem;
            }
        }

        @media (max-width: 480px) {
            .grid {
                grid-template-columns: 1fr;
            }
            header {
                padding: 15px 20px;
            }
        }
    </style>
</head>
<body>

    <header>
        <i data-lucide="book-open"></i>
        <h2>Learn Portuguese</h2>
    </header>

    <main>
        <section class="hero">
            <div class="avatar-container">
                <img src="img/icon.jpg" alt="Kaique">
            </div>
            <h1>Learn Portuguese with Kaique</h1>
            <p>Learn Brazilian Portuguese through immersion and language exchange.</p>
        </section>

        <section class="grid">
            <a href="HighFrequencyVocabulary.html" class="card">
                <div class="card-header">
                    <i data-lucide="book-open" class="card-icon"></i>
                    <span class="card-emoji">📖</span>
                </div>
                <h3 class="card-title">High Frequency Vocabulary</h3>
            </a>

            <a href="EssentialPhrases.html" class="card">
                <div class="card-header">
                    <i data-lucide="message-square" class="card-icon"></i>
                    <span class="card-emoji">💬</span>
                </div>
                <h3 class="card-title">Essential Phrases</h3>
            </a>

            <a href="IntroduceYourself.html" class="card">
                <div class="card-header">
                    <i data-lucide="user-circle" class="card-icon"></i>
                    <span class="card-emoji">👋</span>
                </div>
                <h3 class="card-title">Introduce Yourself</h3>
            </a>

            <!-- <a href="LearnwithChatGPT.html" class="card">
                <div class="card-header">
                    <i data-lucide="bot" class="card-icon"></i>
                    <span class="card-emoji">🤖</span>
                </div>
                <h3 class="card-title">Learn with ChatGPT</h3>
            </a>

            <a href="LanguageExchange.html" class="card">
                <div class="card-header">
                    <i data-lucide="users" class="card-icon"></i>
                    <span class="card-emoji">🤝</span>
                </div>
                <h3 class="card-title">Language Exchange</h3>
            </a>

            <a href="Resources.html" class="card">
                <div class="card-header">
                    <i data-lucide="book-marked" class="card-icon"></i>
                    <span class="card-emoji">📱</span>
                </div>
                <h3 class="card-title">Resources</h3>
            </a> -->
        </section>
    </main>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        // Inicializa os ícones
        lucide.createIcons();
    </script>
</body>
</html>
