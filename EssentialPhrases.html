<!DOCTYPE html>
<html lang="pt-BR">

            padding: 0;
            box-sizing: border-box;
        }

            background: #fefcf5;
            font-family: 'Inter', sans-serif;
            color: #1e1e2a;
            line-height: 1.4;
        }

        /* navbar / header */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 32px;
            background: #ffffff;
            border-bottom: 2px solid #000000;

            gap: 16px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            font-size: 1.4rem;
            text-decoration: none;
            color: #000;
        }

        .logo i {
            font-size: 1.7rem;
        }

        .home-btn {
            background: #fde047;
            border: 1.5px solid #000;
            border-radius: 40px;
            padding: 8px 22px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            color: #000;
            box-shadow: 2px 2px 0 #000;
            transition: all 0.1s ease;
            display: inline-block;
        }

        .home-btn:active {
            transform: translate(2px, 2px);
            box-shadow: none;
        }

        /* main container */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 24px 70px;
        }

        .page-title {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-title h1 {
            font-family: 'Fredoka', sans-serif;
            font-size: 2.8rem;
            letter-spacing: -0.5px;
            font-weight: 700;
        }

        .page-title p {
            color: #4b5563;
            font-size: 1.1rem;
            margin-top: 6px;
        }

        /* search bar */
        .search-wrapper {
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
        }
        .search-box {
            display: flex;
            align-items: center;
            background: white;
            border: 2px solid #000;
            border-radius: 60px;
            padding: 6px 6px 6px 20px;
            width: 100%;
            max-width: 480px;
            box-shadow: 3px 3px 0 #000;
        }
        .search-box i {
            color: #6c757d;
            font-size: 1.2rem;
        }
        .search-box input {
            flex: 1;
            border: none;
            padding: 12px 12px;
            font-size: 1rem;
            background: transparent;
            outline: none;
            font-family: 'Inter', sans-serif;
        }
        .clear-search {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0 12px;
            color: #4b5563;
        }
        .clear-search:hover {
            color: #000;
        }

        /* categories (toggle accordion) */
        .phrases-accordion {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .phrase-category {
            background: #ffffff;
            border: 2px solid #000;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.05);
            transition: all 0.15s;
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 24px;
            background: #faf9f5;
            cursor: pointer;
            border-bottom: 1px solid #e2e2e0;
            transition: background 0.2s;
        }
        .category-header:hover {
            background: #f3f2ee;
        }
        .category-header h3 {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .category-header h3 i {
            color: #e67e22;
            width: 28px;
            font-size: 1.3rem;
        }
        .chevron-icon {
            font-size: 1.3rem;
            transition: transform 0.25s ease;
            color: #2c3e4e;
        }
        .phrase-list {
            display: none;
            padding: 16px 20px;
            background: white;
            flex-direction: column;
            gap: 10px;
            border-top: 1px solid #f0efea;
        }
        .phrase-list.open {
            display: flex;
        }

        /* phrase item card */
        .phrase-item {
            background: #fefef9;
            border: 1px solid #e9e8e3;
            border-radius: 18px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.1s;
            gap: 12px;
        }
        .phrase-text {
            flex: 1;
        }
        .phrase-text p {
            margin: 4px 0;
        }
        .phrase-text p strong {
            font-size: 1rem;
            font-weight: 700;
            color: #1f2937;
        }
        .phrase-text p:first-child {
            font-weight: 600;
            font-size: 1.02rem;
        }
        .phrase-text p:last-child {
            font-size: 0.85rem;
            color: #5b6e8c;
        }
        .audio-btn {
            background: #ccf0c3;
            border: 1.5px solid #1e1e2a;
            border-radius: 40px;
            width: 42px;
            height: 42px;
            display: flex;

            font-size: 1.3rem;

            }

            }

</head>

    // audio helper (speech synthesis)
    function playAudioPhrase(text) {
        if (!text) return;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'pt-BR';
        utterance.rate = 0.9;
        window.speechSynthesis.cancel(); // evitar sobreposição
        window.speechSynthesis.speak(utterance);
    }

    // função para criar HTML com highlight
    function highlightText(text, query) {
        if (!query || query.trim() === "") return text;
        const regex = new RegExp(`(${escapeRegex(query)})`, 'gi');
        return text.replace(regex, `<span class="highlight">$1</span>`);
    }

    function escapeRegex(str) {
        return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    let currentSearch = "";

    function renderPhrases(searchTerm = "") {
        currentSearch = searchTerm.trim().toLowerCase();
        const container = document.getElementById("accordionRoot");
        if (!container) return;
        container.innerHTML = "";

        let hasAnyVisible = false;

        categoriesData.forEach((category, idx) => {
            // filtrar frases
            let filteredPhrases = category.phrases;
            let categoryMatches = false;
            if (currentSearch !== "") {
                filteredPhrases = category.phrases.filter(p => 
                    p.pt.toLowerCase().includes(currentSearch) || 
                    p.en.toLowerCase().includes(currentSearch)
                );
                if (filteredPhrases.length > 0) categoryMatches = true;
            } else {
                categoryMatches = true;
            }

            if (currentSearch !== "" && !categoryMatches) return;
            hasAnyVisible = true;

            const catDiv = document.createElement("div");
            catDiv.className = "phrase-category";
            const catId = `cat-${idx}`;

            // header
            const header = document.createElement("div");
            header.className = "category-header";
            header.innerHTML = `
                <h3><i class="fas ${category.icon}"></i> ${category.name}</h3>
                <i class="fas fa-chevron-down chevron-icon"></i>
            `;
            const phraseListDiv = document.createElement("div");
            phraseListDiv.className = "phrase-list";

            filteredPhrases.forEach(phrase => {
                const item = document.createElement("div");
                item.className = "phrase-item";
                const highlightedPt = currentSearch ? highlightText(phrase.pt, currentSearch) : phrase.pt;
                const highlightedEn = currentSearch ? highlightText(phrase.en, currentSearch) : phrase.en;
                item.innerHTML = `
                    <div class="phrase-text">
                        <p><strong>${highlightedPt}</strong></p>
                        <p>${highlightedEn}</p>
                    </div>
                    <button class="audio-btn" aria-label="Ouvir pronúncia"><i class="fas fa-volume-up"></i></button>
                `;
                const audioBtn = item.querySelector(".audio-btn");
                audioBtn.addEventListener("click", (e) => {
                    e.stopPropagation();
                    playAudioPhrase(phrase.pt);
                });
                phraseListDiv.appendChild(item);
            });

            // toggle logic
            let isOpen = (currentSearch !== ""); // se busca ativa, abrir automaticamente
            if (currentSearch !== "") {
                phraseListDiv.classList.add("open");
            }
            header.addEventListener("click", () => {
                phraseListDiv.classList.toggle("open");
                const icon = header.querySelector(".chevron-icon");
                if (phraseListDiv.classList.contains("open")) {
                    icon.style.transform = "rotate(180deg)";
                } else {
                    icon.style.transform = "rotate(0deg)";
                }
            });
            const icon = header.querySelector(".chevron-icon");
            if (phraseListDiv.classList.contains("open")) icon.style.transform = "rotate(180deg)";
            catDiv.appendChild(header);
            catDiv.appendChild(phraseListDiv);
            container.appendChild(catDiv);
        });

        if (!hasAnyVisible && currentSearch !== "") {
            container.innerHTML = `<div class="no-results"><i class="fas fa-search"></i> Nenhuma frase encontrada para “${escapeHtml(currentSearch)}”. Tente outra palavra.</div>`;
        }
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Eventos e inicialização
    document.addEventListener("DOMContentLoaded", () => {
        renderPhrases("");
        const searchInput = document.getElementById("searchInput");
        const clearBtn = document.getElementById("clearSearchBtn");
        if (searchInput) {
            searchInput.addEventListener("input", (e) => {
                renderPhrases(e.target.value);
            });
        }
        if (clearBtn) {
            clearBtn.addEventListener("click", () => {
                if (searchInput) searchInput.value = "";
                renderPhrases("");
            });
        }
    });
</script>
</body>
</html>
